<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="overlay" onclick="closeAll()"></div>

    <div id="login-modal" class="modal">
      <div class="modal-content">
        <span
          style="
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 24px;
          "
          onclick="closeModal('login-modal')"
          >×</span
        >
        <h2>Bejelentkezés</h2>
        <input type="email" id="login-email" placeholder="E-mail cím" />
        <input type="password" id="login-password" placeholder="Jelszó" />
        <button class="auth-submit" onclick="handleLogin()">Belépés</button>
        <p
          style="
            text-align: center;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
            margin-top: 15px;
          "
          onclick="openRegister()"
        >
          Nincs fiókom, regisztrálok
        </p>
      </div>
    </div>

    <div id="register-modal" class="modal">
      <div
        class="modal-content"
        style="width: 450px; max-height: 90vh; overflow-y: auto"
      >
        <span
          style="
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 24px;
          "
          onclick="closeModal('register-modal')"
          >×</span
        >
        <h2>Regisztráció</h2>
        <select id="user-type" onchange="toggleCompanyFields()">
          <option value="individual">Magánszemély</option>
          <option value="company">Cég</option>
        </select>
        <input
          type="text"
          id="reg-company"
          placeholder="Cégnév"
          style="display: none"
        />
        <input type="text" id="reg-fname" placeholder="Vezetéknév" />
        <input type="text" id="reg-lname" placeholder="Keresztnév" />
        <input type="tel" id="reg-phone" placeholder="Telefonszám" />
        <input type="text" id="reg-zip" placeholder="Irányítószám" />
        <input type="text" id="reg-city" placeholder="Település" />
        <input type="text" id="reg-street" placeholder="Utca, Házszám" />
        <input type="email" id="reg-email" placeholder="E-mail cím" />
        <input
          type="password"
          id="reg-password"
          placeholder="Jelszó"
          oninput="checkStrength(this.value)"
        />
        <div
          id="strength-meter"
          style="height: 5px; background: #eee; margin-bottom: 10px"
        >
          <div
            id="strength-bar"
            style="width: 0; height: 100%; transition: 0.3s"
          ></div>
        </div>
        <input
          type="password"
          id="reg-password-confirm"
          placeholder="Jelszó újra"
        />
        <button class="auth-submit" onclick="handleRegister()">
          Regisztráció
        </button>
      </div>
    </div>

    <header>
      <div style="font-size: 1.5rem; font-weight: bold">Webshop</div>
      <div class="nav-btns">
        <span id="user-display" style="font-size: 0.8rem"></span>
        <button id="nav-auth-btn" class="btn-action" onclick="openLogin()">
          Bejelentkezés
        </button>
        <button
          id="cart-btn"
          class="btn-action cart-icon-btn"
          onclick="toggleCart()"
        >
          🛒 <span id="cart-count">0</span>
        </button>
      </div>
    </header>

    <div id="cart-sidebar">
      <div class="cart-header">
        <h3 style="margin: 0">Kosarad</h3>
        <span class="close-cart" onclick="toggleCart()">×</span>
      </div>
      <div id="cart-items"></div>
      <div class="cart-footer">
        <div class="total-row">
          <span>Összesen:</span><span id="cart-total">0 Ft</span>
        </div>
        <button
          id="order-start-btn"
          class="buy-button"
          style="background: var(--success); width: 100%"
          onclick="showCheckout()"
        >
          Megrendelés
        </button>

        <div id="checkout-form">
          <input type="text" id="cust-name" placeholder="Teljes név" />
          <input type="text" id="cust-addr" placeholder="Szállítási cím" />
          <button
            class="buy-button"
            style="background: var(--dark); width: 100%"
            onclick="finishOrder()"
          >
            Rendelés véglegesítése
          </button>
        </div>
        <button
          class="btn-action"
          style="width: 100%; margin-top: 10px; background: #95a5a6"
          onclick="clearCart()"
        >
          Kosár ürítése
        </button>
      </div>
    </div>

    <div class="container">
      <h1>Termékeink</h1>
      <div id="products-container"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
