<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szuper Webshop - Fix Sorrend</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* EZ FELEL AZ EGYMÁS MELLETTI ELRENDEZÉSÉRT */
        #products-container {
            display: grid;
            /* Minimum 300px széles oszlopok, amik kitöltik a helyet egymás mellett */
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
        }

        /* Mobilon (768px alatt) egymás alá rakja őket, hogy elférjenek */
        @media (max-width: 768px) {
            #products-container {
                grid-template-columns: 1fr;
            }
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .product-image-container {
            width: 100%;
            height: 200px;
            background-color: #eee;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .buy-button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        #cart-count {
            background: #e74c3c;
            padding: 2px 7px;
            border-radius: 50%;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.5rem; font-weight: bold;">SzuperWebshop</div>
        <div>🛒 Kosár: <span id="cart-count">0</span></div>
    </header>

    <div class="container">
        <h1 style="text-align:center">Kiemelt ajánlataink</h1>
        <div id="products-container">
            <p style="text-align:center; grid-column: 1/-1;">Betöltés...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cusfbbukgmklizkirlfk.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_bbUHpTINCLVh1wpyZuamIA_2I0kBcPA'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchProducts() {
            try {
                const { data, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('id', { ascending: true }); // Sorrendben kérjük le

                if (error) throw error;
                displayProducts(data);
            } catch (err) {
                console.error(err);
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('products-container');
            
            // Fix, működő képek
            const fixedImages = [
                "https://images.pexels.com/photos/2115256/pexels-photo-2115256.jpeg?auto=compress&cs=tinysrgb&w=600", // Egér
                "https://images.pexels.com/photos/1779487/pexels-photo-1779487.jpeg?auto=compress&cs=tinysrgb&w=600", // Billentyűzet
                "https://images.pexels.com/photos/1029757/pexels-photo-1029757.jpeg?auto=compress&cs=tinysrgb&w=600"  // Monitor
            ];

            container.innerHTML = products.map((product, index) => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img class="product-image" src="${fixedImages[index % 3]}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="product-price">${Number(product.price).toLocaleString()} Ft</p>
                        <button class="buy-button" onclick="addToCart()">Kosárba</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart() {
            const count = document.getElementById('cart-count');
            count.innerText = parseInt(count.innerText) + 1;
        }

        fetchProducts();
    </script>
</body>
</html>
