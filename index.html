<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szuper Webshop - Email Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark: #2c3e50; --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        header { background: var(--dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-btns { display: flex; gap: 15px; align-items: center; }
        .btn-auth { background: #556677; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* LOGIN MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 350px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .auth-submit-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .switch-auth { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; }

        /* KOSÁR ÉS TERMÉKEK (Maradt a régi, bevált stílus) */
        #cart-sidebar { position: fixed; top: 0; right: -400px; width: 380px; max-width: 90%; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: 0.4s; z-index: 1000; display: flex; flex-direction: column; }
        #cart-sidebar.open { right: 0; }
        #cart-items { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 20px; background: #eee; }
        #products-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { width: 100%; height: 180px; object-fit: cover; }
        .product-info { padding: 15px; flex-grow: 1; }
        .buy-button { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        #checkout-form { display: none; margin-top: 15px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:24px" onclick="closeAuth()">×</span>
            <h2 id="auth-title" style="text-align:center">Bejelentkezés</h2>
            
            <input type="email" id="auth-email" placeholder="E-mail cím">
            <input type="password" id="auth-password" placeholder="Jelszó">
            
            <button id="auth-main-btn" class="auth-submit-btn" onclick="handleAuth()">Bejelentkezés</button>
            <p id="auth-switch" class="switch-auth" onclick="toggleAuthMode()">Még nincs fiókom, regisztrálok</p>
        </div>
    </div>

    <header>
        <div style="font-size: 1.5rem; font-weight: bold;">SzuperWebshop</div>
        <div class="nav-btns">
            <span id="user-display" style="font-size: 0.9rem;"></span>
            <button id="nav-auth-btn" class="btn-auth" onclick="openAuth()">Bejelentkezés</button>
            <button class="btn-auth" style="background:var(--primary)" onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
        </div>
    </header>

    <div id="cart-sidebar">
        <div style="padding:20px; background:var(--dark); color:white; display:flex; justify-content:space-between">
            <h3 style="margin:0">Kosár</h3>
            <span style="cursor:pointer; font-size: 24px;" onclick="toggleCart()">×</span>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px">
                <span>Összesen:</span><span id="cart-total">0 Ft</span>
            </div>
            <button id="order-btn" class="buy-button" style="background:var(--success)" onclick="showCheckout()">Megrendelés</button>

            <div id="checkout-form">
                <h4>Szállítási adatok</h4>
                <input type="text" id="c-name" placeholder="Teljes név">
                <input type="text" id="c-addr" placeholder="Cím">
                <button class="buy-button" style="background:var(--dark)" onclick="finishOrder()">Rendelés elküldése</button>
            </div>
        </div>
    </div>

    <div id="products-container"></div>

    <script>
        const SUPABASE_URL = 'https://cusfbbukgmklizkirlfk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bbUHpTINCLVh1wpyZuamIA_2I0kBcPA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cart = [];
        let isLoginMode = true;

        // --- AUTH KEZELÉS ---
        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Bejelentkezés" : "Regisztráció";
            document.getElementById('auth-main-btn').innerText = isLoginMode ? "Bejelentkezés" : "Regisztráció";
            document.getElementById('auth-switch').innerText = isLoginMode ? "Még nincs fiókom, regisztrálok" : "Már van fiókom, belépek";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if (isLoginMode) {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Hiba: " + error.message); else closeAuth();
            } else {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) alert("Hiba: " + error.message); else alert("Regisztráció sikeres! Ellenőrizd az e-mailedet a megerősítéshez.");
            }
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            const user = session?.user;
            const navAuthBtn = document.getElementById('nav-auth-btn');
            const userDisplay = document.getElementById('user-display');

            if (user) {
                userDisplay.innerText = user.email;
                navAuthBtn.innerText = "Kijelentkezés";
                navAuthBtn.onclick = () => supabaseClient.auth.signOut();
                document.getElementById('c-name').value = ""; // Itt tölthetnéd be a user nevét ha lenne mentve
            } else {
                userDisplay.innerText = "";
                navAuthBtn.innerText = "Bejelentkezés";
                navAuthBtn.onclick = openAuth;
            }
        });

        // --- BOLT LOGIKA ---
        async function loadProducts() {
            const { data } = await supabaseClient.from('products').select('*').order('id', {ascending: true});
            const imgUrls = [
                "https://images.pexels.com/photos/2115256/pexels-photo-2115256.jpeg?w=400",
                "https://images.pexels.com/photos/1779487/pexels-photo-1779487.jpeg?w=400",
                "https://images.pexels.com/photos/1029757/pexels-photo-1029757.jpeg?w=400"
            ];
            document.getElementById('products-container').innerHTML = data.map((p, i) => `
                <div class="product-card">
                    <img src="${imgUrls[i%3]}" class="product-image">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="product-price">${Number(p.price).toLocaleString()} Ft</p>
                        <button class="buy-button" onclick="addToCart('${p.id}','${p.name}',${p.price})">Kosárba</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }

        function addToCart(id, name, price) {
            const item = cart.find(i => i.id === id);
            if (item) item.qty++; else cart.push({id, name, price, qty: 1});
            updateCart();
            if(!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map(i => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px">
                    <span>${i.name} (x${i.qty})</span>
                    <span>${(i.price * i.qty).toLocaleString()} Ft</span>
                </div>
            `).join('');
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + " Ft";
            document.getElementById('cart-count').innerText = cart.reduce((sum, i) => sum + i.qty, 0);
        }

        function showCheckout() {
            if (cart.length === 0) return alert("A kosarad üres!");
            document.getElementById('checkout-form').style.display = 'block';
            document.getElementById('order-btn').style.display = 'none';
        }

        function finishOrder() {
            const name = document.getElementById('c-name').value;
            if (!name) return alert("Add meg a neved!");
            alert("Köszönjük, " + name + "! A rendelésed rögzítettük.");
            cart = []; updateCart(); toggleCart();
            document.getElementById('checkout-form').style.display = 'none';
            document.getElementById('order-btn').style.display = 'block';
        }

        loadProducts();
    </script>
</body>
</html>
