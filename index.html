<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szuper Webshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Termékeink</h1>
    <div id="products-container">Betöltés...</div>

    
        
<script>
    // 1. Az adatok (ezek maradjanak a te adataid)
    const projectUrl = 'cusfbbukgmklizkirlfk'; 
    const anonKey = 'sb_publishable_bbUHpTINCLVh1wpyZuamIA_2I0kBcPA'; 

    // 2. JAVÍTÁS: Itt a változó nevét 'supabaseClient'-re írjuk át!
    // Így nem ütközik a 'supabase' könyvtárnévvel.
    const supabaseClient = supabase.createClient(projectUrl, anonKey);

    async function getProducts() {
        try {
            // 3. Itt is a 'supabaseClient'-et használjuk a lekéréshez
            const { data, error } = await supabaseClient
                .from('products')
                .select('*');

            if (error) throw error;

            const container = document.getElementById('products-container');
            
            if (!data || data.length === 0) {
                container.innerHTML = "Nincsenek termékek az adatbázisban.";
                return;
            }

            // Megjelenítés
            container.innerHTML = data.map(p => `
                <div style="border: 1px solid #ccc; margin: 10px; padding: 10px; border-radius: 8px;">
                    <h3>${p.name}</h3>
                    <p>Ár: ${p.price} Ft</p>
                </div>
            `).join('');

        } catch (err) {
            console.error("Hiba történt:", err);
            document.getElementById('products-container').innerHTML = "Hiba az adatok lekérésekor: " + err.message;
        }
    }

    getProducts();
</script>        


</body>
</html>
